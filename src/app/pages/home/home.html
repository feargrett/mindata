<ui-section bgColor="gray">
  <ui-card
    [label]="cardData.label"
    [title]="cardData.title"
    [description]="cardData.description"
    [buttonLabel]="cardData.buttonLabel"
  />
</ui-section>

<ui-section bgColor="white">
  <header class="mb-8 text-left">
    <h2 class="font-inter text-on-background text-4xl font-bold">
      Lorem ipsum dolor sit
    </h2>
    <p class="font-inter text-on-background-variant mt-2 text-base">
      Lorem ipsum dolor sit amet, consectetur adipiscing elit
    </p>
  </header>

  <div
    class="grid grid-cols-1 gap-6 min-[460px]:grid-cols-1 md:grid-cols-2 lg:grid-cols-3"
  >
    @for (card of cardsData; track card.id) {
      <ui-card
        [label]="card.label"
        [title]="card.title"
        [description]="card.description"
        [withPadding]="false"
        [showShadow]="false"
        align="vertical"
      />
    }
  </div>
</ui-section>
