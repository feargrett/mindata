<article class="card-image">
  <img
    class="card-image__background"
    [ngSrc]="imageUrl()"
    alt="Card image"
    fill
  />

  <div class="card-image__overlay"></div>

  <div class="card-image__content">
    <h3 class="card-image__title">{{ title() }}</h3>
    <p class="card-image__description">{{ description() }}</p>

    <ui-button variant="basic">
      {{ buttonLabel() }}
      <ui-svg [icon]="buttonIcon()" />
    </ui-button>
  </div>
</article>
